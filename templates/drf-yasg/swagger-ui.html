{% extends "drf-yasg/swagger-ui.html" %}

{% block extra_styles %}
{{ block.super }}
<style>
    body {
        background-color: #0f172a !important;
        color: #f8fafc !important;
        background-image: 
            radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
            radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
            radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%) !important;
        background-attachment: fixed !important;
    }
    .swagger-ui .info .title,
    .swagger-ui .info p,
    .swagger-ui .info a,
    .swagger-ui .scheme-container, 
    .swagger-ui .opblock .opblock-summary-method,
    .swagger-ui .opblock .opblock-summary-path,
    .swagger-ui .opblock .opblock-summary-path__deprecated,
    .swagger-ui .opblock .opblock-summary-description {
        color: #f8fafc !important;
    }
    .swagger-ui .scheme-container {
        background: rgba(30, 41, 59, 0.6) !important;
        backdrop-filter: blur(12px) !important;
        box-shadow: none !important;
    }
    .swagger-ui .opblock {
        background: rgba(30, 41, 59, 0.4) !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
    }
    .swagger-ui section.models {
        background: rgba(30, 41, 59, 0.6) !important;
        border-color: rgba(255,255,255,0.1) !important;
    }
    .swagger-ui section.models h4, .swagger-ui section.models .model-title, .swagger-ui .model {
        color: #f8fafc !important;
    }
    .swagger-ui .parameter__name, .swagger-ui .parameter__type {
        color: #cbd5e1 !important;
    }
    .swagger-ui .response-col_status, .swagger-ui .response-col_description {
        color: #f8fafc !important;
    }
</style>
{% endblock %}
